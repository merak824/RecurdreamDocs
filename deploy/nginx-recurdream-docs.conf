server {
    listen 80;
    server_name docs.recurdream.com;

    root /var/www/recurdream-docs;
    index index.html;

    access_log /var/log/nginx/recurdream-docs.access.log;
    error_log /var/log/nginx/recurdream-docs.error.log;

    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
