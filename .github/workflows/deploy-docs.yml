name: Deploy Docs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

      - name: Configure SSH
        env:
          DOCS_HOST: ${{ secrets.DOCS_HOST }}
          DOCS_PORT: ${{ secrets.DOCS_PORT }}
          DOCS_SSH_KEY: ${{ secrets.DOCS_SSH_KEY }}
          DOCS_KNOWN_HOSTS: ${{ secrets.DOCS_KNOWN_HOSTS }}
        run: |
          test -n "$DOCS_HOST" || (echo "Missing GitHub Secret: DOCS_HOST" && exit 1)
          test -n "$DOCS_SSH_KEY" || (echo "Missing GitHub Secret: DOCS_SSH_KEY" && exit 1)

          mkdir -p ~/.ssh
          printf '%s\n' "$DOCS_SSH_KEY" > ~/.ssh/recurdream_docs
          chmod 600 ~/.ssh/recurdream_docs

          if [ -n "$DOCS_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DOCS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DOCS_PORT:-22}" -H "$DOCS_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Deploy to server
        env:
          DOCS_HOST: ${{ secrets.DOCS_HOST }}
          DOCS_PORT: ${{ secrets.DOCS_PORT }}
          DOCS_USER: ${{ secrets.DOCS_USER }}
          DOCS_TARGET: ${{ secrets.DOCS_TARGET }}
        run: |
          test -n "$DOCS_USER" || (echo "Missing GitHub Secret: DOCS_USER" && exit 1)
          test -n "$DOCS_TARGET" || (echo "Missing GitHub Secret: DOCS_TARGET" && exit 1)

          PORT="${DOCS_PORT:-22}"
          SSH="ssh -i ~/.ssh/recurdream_docs -p $PORT -o StrictHostKeyChecking=yes"
          RSYNC_RSH="ssh -i ~/.ssh/recurdream_docs -p $PORT -o StrictHostKeyChecking=yes"

          $SSH "$DOCS_USER@$DOCS_HOST" "mkdir -p '$DOCS_TARGET'"
          rsync -az --delete -e "$RSYNC_RSH" .vitepress/dist/ "$DOCS_USER@$DOCS_HOST:$DOCS_TARGET/"
